project:
  type: website
  output-dir: docs # folder where all rendered files (for preview) are saved to
  render:
    - "*.qmd"
    - "!x_not_published/" # do not render / ignore this folder

website:
  title: ""
  #favicon: home_polygon_1.png # image in root folder, same for "home" page
  search:
    location: navbar
    type: overlay
  page-footer: 
        #background: 'transparent'
        center: © 2026  &middot; Made with <span style="color:#e63946;">♥</span>, [![](https://www.r-project.org/Rlogo.png){fig-alt="R" width=25px}](https://www.r-project.org/)  and [![](https://quarto.org/quarto.png){fig-alt="Quarto" width=65px}](https://quarto.org/) <br> Check out the code on [![](https://cdnjs.cloudflare.com/ajax/libs/simple-icons/9.0.0/github.svg){fig-alt="GitHub" width=25px}](https://github.com/serigra/Webpage_Fiesta)
  navbar:
    title: false # use "false" if not using website title on left side of navbar...
    search: false
    #logo: home_polygon_1.png # logo on top left, next to website title
    right:
      - href: index.qmd
        text: HOME
      - href: RSVP/RSVP.qmd
        text: RSVP · AN/ ABMELDUNG
      - href: info/info.qmd
        text: INFO
    
format:
  html:
    theme: cosmo
    backgroundcolor:  '#EFECE6' #'#EDEAE3'
    css: styles.css
    toc: true
    grid: # to format layout of "HOME" Site, formating of other sites is defined in styles_publications.css, styles_talks.css, etc
      sidebar-width: 100px
      body-width: 1100px
      margin-width: 200px
      gutter-width: 1.5rem

editor: source

  
